<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABC Buddy — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8faf8;
        color: #1a2e1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }
      .icon { font-size: 4rem; margin-bottom: 1rem; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #1a6b3c; }
      p { font-size: 0.95rem; color: #4a6b4a; max-width: 280px; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #1a6b3c;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="icon">🐕</div>
    <h1>You're offline</h1>
    <p>ABC Buddy needs a connection to load. Your cached records are still available once the app loads.</p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
